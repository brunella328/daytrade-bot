<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>當沖 Bot Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 24px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #718096; font-size: 0.85rem; margin-bottom: 28px; }
    .badge { display: inline-block; background: #1a9e5c; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #1a1d27; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; }
    .card-label { font-size: 0.75rem; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .card-value { font-size: 1.8rem; font-weight: 700; }
    .positive { color: #48bb78; }
    .negative { color: #fc8181; }
    .neutral { color: #e2e8f0; }
    table { width: 100%; border-collapse: collapse; background: #1a1d27; border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; }
    thead { background: #2d3748; }
    th { padding: 12px 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #a0aec0; }
    td { padding: 12px 16px; font-size: 0.875rem; border-top: 1px solid #2d3748; }
    tr:hover td { background: #252836; }
    .exit-tp { color: #48bb78; font-weight: 600; }
    .exit-sl { color: #fc8181; font-weight: 600; }
    .exit-force { color: #f6ad55; font-weight: 600; }
    .refresh-info { font-size: 0.75rem; color: #4a5568; margin-top: 12px; text-align: right; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: #a0aec0; }
    .empty { text-align: center; padding: 48px; color: #4a5568; }
  </style>
</head>
<body>
  <h1>當沖 Bot Dashboard <span class="badge">Dry Run</span></h1>
  <p class="subtitle" id="last-update">載入中...</p>

  <div class="stats" id="stats-grid">
    <div class="card"><div class="card-label">總交易數</div><div class="card-value neutral" id="s-total">—</div></div>
    <div class="card"><div class="card-label">勝率</div><div class="card-value neutral" id="s-winrate">—</div></div>
    <div class="card"><div class="card-label">總 PnL</div><div class="card-value neutral" id="s-total-pnl">—</div></div>
    <div class="card"><div class="card-label">平均 PnL</div><div class="card-value neutral" id="s-avg-pnl">—</div></div>
  </div>

  <div class="section-title">交易紀錄</div>
  <table>
    <thead>
      <tr>
        <th>股票</th>
        <th>進場價</th>
        <th>出場價</th>
        <th>數量</th>
        <th>PnL</th>
        <th>出場原因</th>
        <th>進場時間</th>
        <th>出場時間</th>
      </tr>
    </thead>
    <tbody id="trades-body">
      <tr><td colspan="8" class="empty">尚無交易紀錄</td></tr>
    </tbody>
  </table>
  <p class="refresh-info">每 30 秒自動更新</p>

  <script>
    async function load() {
      try {
        const [statsRes, tradesRes] = await Promise.all([
          fetch('/api/stats'),
          fetch('/api/trades')
        ]);
        const stats = await statsRes.json();
        const trades = await tradesRes.json();

        document.getElementById('s-total').textContent = stats.totalTrades ?? 0;
        const wr = (stats.winRate * 100).toFixed(1) + '%';
        document.getElementById('s-winrate').textContent = wr;
        setValColor('s-total-pnl', stats.totalPnL);
        setValColor('s-avg-pnl', stats.avgPnL);

        const tbody = document.getElementById('trades-body');
        if (!trades || trades.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="empty">尚無交易紀錄</td></tr>';
        } else {
          tbody.innerHTML = trades.map(t => `
            <tr>
              <td><strong>${t.symbol}</strong></td>
              <td>${t.entryPrice.toFixed(2)}</td>
              <td>${t.exitPrice.toFixed(2)}</td>
              <td>${t.qty}</td>
              <td class="${t.pnL >= 0 ? 'positive' : 'negative'}">${t.pnL >= 0 ? '+' : ''}${t.pnL.toFixed(2)}</td>
              <td class="exit-${t.exitReason === 'TP' ? 'tp' : t.exitReason === 'SL' ? 'sl' : 'force'}">${t.exitReason}</td>
              <td>${fmtTime(t.entryTime)}</td>
              <td>${fmtTime(t.exitTime)}</td>
            </tr>`).join('');
        }

        document.getElementById('last-update').textContent = '最後更新：' + new Date().toLocaleTimeString('zh-TW');
      } catch (e) {
        document.getElementById('last-update').textContent = '無法連線到後端';
      }
    }

    function setValColor(id, val) {
      const el = document.getElementById(id);
      el.textContent = (val >= 0 ? '+' : '') + Number(val).toFixed(2);
      el.className = 'card-value ' + (val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral');
    }

    function fmtTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW');
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
